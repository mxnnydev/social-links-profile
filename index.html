<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Social links profile</title>
  </head>
  <body>
    <main class="card">
      <section class="profile">
        <header>
          <figure class="profile-image-container">
            <img
              src="./assets/images/avatar-jessica.jpeg"
              alt="Profile Avatar of Jessica Randall"
            />
          </figure>
          <section class="profile-info">
            <h1>Jessica Randall</h1>
            <span class="highlight">London, United Kingdom</span>
            <span>"Front-end developer and avid reader."</span>
          </section>
        </header>
        <section class="socials">
          <ul class="socials-links">
            <button>
              <li><a href="https://github.com" target="_blank">GitHub</a></li>
            </button>
            <button>
              <li>
                <a href="https://www.frontendmentor.io" target="_blank"
                  >Frontend Mentor</a
                >
              </li>
            </button>
            <button>
              <li>
                <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
              </li>
            </button>
            <button>
              <li><a href="https://twitter.com" target="_blank">Twitter</a></li>
            </button>
            <button>
              <li>
                <a href="https://www.instagram.com" target="_blank"
                  >Instagram</a
                >
              </li>
            </button>
          </ul>
        </section>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge"
        ><em>Frontend Mentor</em></a
      >
      <br />
      Coded by <a href="https://mxnny.dev">Emmanuel Muttavanchery</a>
    </footer>
  </body>
</html>
